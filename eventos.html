<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koffi — Agenda tu evento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  main.eventos{max-width:460px;margin:0 auto;padding:1.5rem 1.25rem 3rem;}
  main.eventos label{display:block;font-family:'Poppins',sans-serif;font-weight:600;font-size:0.82rem;color:var(--ink);margin:0.9rem 0 0.35rem;}
  main.eventos input{
    width:100%;box-sizing:border-box;border:1px solid var(--rule);border-radius:10px;
    padding:0.65rem 0.8rem;font-family:'Poppins',sans-serif;font-size:0.88rem;
    background:var(--cream-2);color:var(--ink);
  }
  .eventos-btn{
    margin-top:1.4rem;width:100%;background:var(--wine);color:var(--cream);border:none;
    border-radius:999px;font-family:'Poppins',sans-serif;font-weight:600;font-size:0.9rem;
    padding:0.75rem;cursor:pointer;
  }
  .eventos-btn:hover{background:var(--wine-deep);}
  #ok{display:none;text-align:center;padding:2rem 0;}
</style>
</head>
<body>

<div style="padding:0.6rem 1rem 0;"><a href="inicio.html" style="font-family:'Poppins',sans-serif;font-size:0.75rem;color:var(--wine);text-decoration:none;">&larr; Inicio</a></div>

<header>
  <div class="badge"><span>KO</span><span>FFI</span></div>
  <h1>Koffi</h1>
  <p class="location">Agenda tu evento</p>
  <p class="tagline">cumpleaños, reuniones, celebraciones.</p>
</header>

<!-- EDITAR: este formulario solo simula el envío. -->
<!-- Conéctalo a Google Forms, Supabase o Airtable para guardar las reservas de verdad. -->
<main class="eventos" id="form-wrap">
  <form id="eventoForm" onsubmit="return mostrarConfirmacion(event)">
    <label for="nombre">Nombre</label>
    <input id="nombre" required>
    <label for="fecha">Fecha</label>
    <input id="fecha" type="date" required>
    <label for="personas">Número de personas</label>
    <input id="personas" type="number" min="1" required>
    <label for="ocasion">Ocasión</label>
    <input id="ocasion" placeholder="Cumpleaños, aniversario, reunión…">
    <label for="contacto">Teléfono o WhatsApp</label>
    <input id="contacto" required>
    <button class="eventos-btn" type="submit">Enviar solicitud</button>
  </form>
</main>

<main class="eventos" id="ok">
  <p style="font-family:'Baloo 2',sans-serif;font-weight:700;color:var(--wine);font-size:1.1rem;">Solicitud enviada</p>
  <p style="font-family:'Poppins',sans-serif;color:var(--ink-dim);font-size:0.85rem;">Koffi revisa tu solicitud y te confirma por WhatsApp.</p>
</main>

<footer>
  <p class="made">Koffi</p>
  <p>Demo — el formulario todavía no guarda datos reales.</p>
</footer>

<script>
function mostrarConfirmacion(e){
  e.preventDefault();
  document.getElementById('form-wrap').style.display = 'none';
  document.getElementById('ok').style.display = 'block';
  return false;
}
</script>

</body>
</html>
