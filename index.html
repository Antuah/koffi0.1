<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koffi — Inicio</title>
<meta name="description" content="Koffi Cuernavaca — menú, merch y eventos">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  :root{
    --wine:#7a231f;
    --wine-deep:#3f100e;
    --wine-soft:#9a3a32;
    --cream:#faf5ec;
    --cream-2:#f1e6d5;
    --ink:#241512;
    --ink-dim:#7a6a61;
    --gold:#c99a3d;
    --rule:rgba(36,21,18,0.12);
  }

  *{box-sizing:border-box;}
  html{-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Poppins', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  @media (prefers-reduced-motion: no-preference){
    .reveal{
      opacity:0;
      transform:translateY(14px);
      transition:opacity .6s ease, transform .6s ease;
    }
    .reveal.is-visible{opacity:1;transform:translateY(0);}
  }

  /* ---------- Header ---------- */
  header{
    padding:2.6rem 1.25rem 2.2rem;
    text-align:center;
    background:radial-gradient(120% 100% at 50% 0%, var(--wine-soft) 0%, var(--wine) 45%, var(--wine-deep) 100%);
    color:var(--cream);
    position:relative;
  }

  .badge{
    width:88px;
    height:88px;
    border-radius:50%;
    background:var(--cream);
    border:3px solid var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:0 auto 1rem;
    line-height:0.78;
    box-shadow:0 4px 0 rgba(0,0,0,0.25);
  }
  .badge span{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:1.55rem;
    color:var(--wine);
    letter-spacing:0.01em;
  }

  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(2.6rem, 10vw, 3.4rem);
    margin:0;
    line-height:1;
    letter-spacing:0.01em;
    color:var(--cream);
  }
  .location{
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:0.78rem;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0.55rem 0 0;
  }
  .tagline{
    font-family:'Poppins', sans-serif;
    font-weight:400;
    font-style:italic;
    color:rgba(250,245,236,0.75);
    margin:0.8rem 0 0;
    font-size:0.98rem;
  }

  .pdf-btn{
    display:inline-flex;
    align-items:center;
    gap:0.5rem;
    margin-top:1.5rem;
    padding:0.65rem 1.3rem;
    border:1.5px solid var(--gold);
    border-radius:999px;
    color:var(--gold);
    text-decoration:none;
    font-weight:600;
    font-size:0.85rem;
    letter-spacing:0.02em;
    transition:background .25s ease, color .25s ease;
  }
  .pdf-btn:hover{background:var(--gold);color:var(--wine-deep);}

  /* ---------- Sticky category nav ---------- */
  nav.categories{
    position:sticky;
    top:0;
    z-index:20;
    background:linear-gradient(var(--cream) 82%, transparent);
    padding:0.9rem 0 0.6rem;
    backdrop-filter:blur(2px);
  }
  .cat-scroll{
    display:flex;
    gap:0.55rem;
    overflow-x:auto;
    padding:0 1.1rem 0.3rem;
    scrollbar-width:none;
  }
  .cat-scroll::-webkit-scrollbar{display:none;}
  .cat-pill{
    flex:0 0 auto;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:0.88rem;
    color:var(--wine);
    background:var(--cream);
    border:1.5px solid var(--wine);
    padding:0.45rem 1.05rem;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    transition:all .2s ease;
  }
  .cat-pill.active{
    color:var(--cream);
    background:var(--wine);
    border-color:var(--wine);
  }

  /* ---------- Menu sections ---------- */
  main{
    max-width:640px;
    margin:0 auto;
    padding:0.6rem 1.1rem 3rem;
  }
  section.category{
    padding-top:2.2rem;
    scroll-margin-top:4.6rem;
  }
  .cat-heading{
    display:flex;
    align-items:center;
    gap:0.6rem;
    margin-bottom:0.5rem;
  }
  .cat-heading h2{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:1.5rem;
    color:var(--wine);
    margin:0;
  }
  .count-chip{
    flex:0 0 auto;
    width:24px;
    height:24px;
    border-radius:50%;
    background:var(--gold);
    color:var(--wine-deep);
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:0.72rem;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .accent-bar{
    width:56px;
    height:5px;
    border-radius:999px;
    background:var(--gold);
    margin:0 0 1.15rem;
  }

  ul.items{list-style:none;margin:0;padding:0;}
  li.item{
    display:flex;
    justify-content:space-between;
    gap:1rem;
    padding:0.95rem 0;
    border-bottom:1px solid var(--rule);
  }
  li.item:last-child{border-bottom:none;}
  .item-info{flex:1;min-width:0;}
  .item-name-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:0.4rem;
  }
  .item-name{
    font-weight:600;
    font-size:1.02rem;
    color:var(--ink);
  }
  .tag{
    font-size:0.63rem;
    font-weight:600;
    letter-spacing:0.03em;
    text-transform:uppercase;
    padding:0.15rem 0.5rem;
    border-radius:999px;
    border:1px solid var(--wine-soft);
    color:var(--wine);
  }
  .tag.star{
    border-color:var(--gold);
    color:var(--wine-deep);
    background:var(--gold);
    font-weight:700;
  }
  .item-desc{
    margin:0.25rem 0 0;
    font-size:0.85rem;
    color:var(--ink-dim);
    line-height:1.4;
  }
  .item-price{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:1.1rem;
    color:var(--wine);
    white-space:nowrap;
    align-self:flex-start;
    padding-top:0.1rem;
  }

  /* ---------- Footer ---------- */
  footer{
    text-align:center;
    padding:2.4rem 1.25rem 3rem;
    background:var(--cream-2);
    color:var(--ink-dim);
    font-size:0.8rem;
    line-height:1.6;
  }
  footer .made{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:1.05rem;
    color:var(--wine);
    margin-bottom:0.4rem;
  }
</style>
</head>
<body>

<header>
  <div class="badge"><span>KO</span><span>FFI</span></div>
  <h1>Koffi</h1>
  <p class="location">Cuernavaca</p>
  <p class="tagline">but first, koffi.</p>
</header>

<!-- EDITAR: los enlaces están ordenados por longitud del texto, el más corto arriba -->
<main class="home">
  <a class="home-link w-1" href="merch.html">Merch</a>
  <a class="home-link w-2" href="eventos.html">Eventos</a>
  <a class="home-link w-3 filled" href="sucursal1.html">Menú sucursal 1</a>
  <a class="home-link w-4 filled" href="sucursal2.html">Menú sucursal 2</a>
</main>

<footer>
  <p class="made">Koffi</p>
  <p>Demo de inicio — cuando esté aprobado, renombra este archivo a index.html.</p>
</footer>

</body>
</html>
