<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koffi — Inicio</title>
<meta name="description" content="Koffi Cuernavaca — menú, merch y eventos">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="styles.css">
<style>
  main.home{
    max-width:420px;
    margin:0 auto;
    padding:2rem 1.25rem 3rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.85rem;
  }
  .home-link{
    display:block;
    box-sizing:border-box;
    text-align:center;
    text-decoration:none;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    padding:0.85rem 1.2rem;
    border-radius:999px;
    border:1.5px solid var(--wine);
    color:var(--wine);
    background:var(--cream);
    transition:background .2s ease, color .2s ease;
  }
  .home-link:hover{background:var(--wine);color:var(--cream);}
  .home-link.filled{background:var(--wine);color:var(--cream);}
  .home-link.filled:hover{background:var(--wine-deep);}
  .w-1{width:55%;}
  .w-2{width:70%;}
  .w-3{width:85%;}
  .w-4{width:100%;}
</style>
</head>
<body>

<header>
  <div class="badge"><span>KO</span><span>FFI</span></div>
  <h1>Koffi</h1>
  <p class="location">Cuernavaca</p>
  <p class="tagline">but first, koffi.</p>
</header>

<!-- EDITAR: los enlaces están ordenados por longitud del texto, el más corto arriba -->
<main class="home">
  <a class="home-link w-1" href="merch.html">Merch</a>
  <a class="home-link w-2" href="eventos.html">Eventos</a>
  <a class="home-link w-3 filled" href="sucursal1.html">Menú sucursal 1</a>
  <a class="home-link w-4 filled" href="sucursal2.html">Menú sucursal 2</a>
</main>

<footer>
  <p class="made">Koffi</p>
  <p>Demo de inicio — cuando esté aprobado, renombra este archivo a index.html.</p>
</footer>
